backend:
  name: github
  repo: Houraiji/Houraiji.github.io
  branch: main
  base_url: https://houraiji-decap-oauth.3265908977.workers.dev
  auth_endpoint: auth

site_domain: https://Houraiji.github.io
display_url: https://Houraiji.github.io
logo_url: /assets/archive-emblem.svg

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: articles
    label: 文章
    label_singular: 文章
    folder: src/content/articles
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: articles/{{slug}}/
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 日期, name: date, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - { label: 分类, name: category, widget: string }
      - label: 标签
        name: tags
        widget: list
        allow_add: true
        field: { label: 标签, name: tag, widget: string }
      - { label: 世界线, name: worldline, widget: string, required: false }
      - { label: 语气, name: tone, widget: string, required: false }
      - label: 关联项目
        name: relatedProjects
        widget: list
        required: false
        field: { label: 项目名或 ID, name: project, widget: string }
      - { label: 摘要, name: summary, widget: text }
      - { label: 正文, name: body, widget: markdown }

  - name: site_data
    label: 站点数据
    files:
      - label: 个人资料
        name: profile
        file: src/data/profile.json
        format: json
        fields:
          - label: 资料卡
            name: profile
            widget: object
            fields:
              - { label: 显示名称, name: displayName, widget: string }
              - { label: 存档代号, name: handle, widget: string }
              - { label: 简介, name: shortIntro, widget: text }
              - { label: 当前章节, name: currentChapter, widget: string }
              - label: 当前关注
                name: currentFocus
                widget: list
                field: { label: 关注项, name: item, widget: string }
              - { label: 当前状态, name: status, widget: string }
              - label: 链接
                name: quietLinks
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: 名称, name: label, widget: string }
                  - { label: 地址, name: href, widget: string }
              - label: 公开字段
                name: facts
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: 字段名, name: label, widget: string }
                  - { label: 内容, name: value, widget: string }
              - { label: 个人定位, name: narrative, widget: text }
              - { label: 公开口径说明, name: publicNote, widget: text }
          - label: 技能树
            name: skills
            widget: list
            summary: "{{fields.name}} · {{fields.level}}%"
            fields:
              - { label: 技能名, name: name, widget: string }
              - { label: 熟练度, name: level, widget: number, min: 0, max: 100, step: 1 }
              - { label: 备注, name: note, widget: string }
          - label: 兴趣
            name: interests
            widget: list
            field: { label: 兴趣项, name: item, widget: string }
          - label: 风格说明
            name: styleNotes
            widget: list
            required: false
            field: { label: 说明, name: note, widget: text }

      - label: 成长路线
        name: growth
        file: src/data/growth.json
        format: json
        fields:
          - { label: Owner, name: owner, widget: string }
          - { label: Handle, name: handle, widget: string }
          - { label: 时间范围, name: period, widget: string }
          - { label: 叙事主题, name: narrativeTheme, widget: text }
          - label: 节点
            name: growthNodes
            widget: list
            summary: "{{fields.grade}} · {{fields.timeRange}}"
            fields:
              - { label: 标题, name: title, widget: string }
              - { label: 章节, name: chapter, widget: string }
              - { label: 时间范围, name: timeRange, widget: string }
              - { label: 摘要, name: summary, widget: text }
              - { label: 详情, name: details, widget: text }
              - label: 关键词
                name: keywords
                widget: list
                field: { label: 关键词, name: keyword, widget: string }
              - { label: 年级, name: grade, widget: string }
              - { label: 年份, name: year, widget: number }
              - label: 里程碑
                name: milestones
                widget: list
                field: { label: 里程碑, name: milestone, widget: text }
              - label: 技能
                name: skills
                widget: list
                field: { label: 技能, name: skill, widget: string }
              - label: 关联项目
                name: relatedProjects
                widget: list
                field: { label: 项目名或 ID, name: project, widget: string }
              - label: 关联文章
                name: relatedArticles
                widget: list
                required: false
                field: { label: slug, name: article, widget: string }
              - label: 文章路径
                name: articleRefs
                widget: list
                required: false
                field: { label: 路径, name: articleRef, widget: string }
              - { label: Mood 文案, name: mood, widget: text }

      - label: 项目档案
        name: projects
        file: src/data/projects.json
        format: json
        fields:
          - { label: Owner, name: owner, widget: string }
          - { label: 生成说明, name: generatedFor, widget: string }
          - label: 项目列表
            name: projects
            widget: list
            summary: "{{fields.name}} · {{fields.period}}"
            fields:
              - { label: 项目 ID, name: id, widget: string }
              - { label: 名称, name: name, widget: string }
              - { label: 类型, name: type, widget: string }
              - { label: 时间, name: period, widget: string }
              - { label: 来源, name: source, widget: string }
              - { label: URL, name: url, widget: string, required: false }
              - { label: 角色, name: role, widget: string }
              - { label: 简介, name: summary, widget: text }
              - label: 技术栈
                name: techStack
                widget: list
                field: { label: 技术项, name: tech, widget: string }
              - label: 亮点
                name: highlights
                widget: list
                field: { label: 亮点, name: highlight, widget: text }
              - label: 博客角度
                name: blogAngles
                widget: list
                required: false
                field: { label: 角度, name: angle, widget: text }
              - { label: 可信度, name: confidence, widget: string }
