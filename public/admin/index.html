<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Houraiji Local Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a1020;
        --bg-soft: rgba(17, 24, 39, 0.88);
        --panel: rgba(12, 18, 32, 0.82);
        --line: rgba(146, 171, 255, 0.24);
        --line-strong: rgba(255, 188, 223, 0.38);
        --text: #edf3ff;
        --muted: #94a7c6;
        --accent: #9bb7ff;
        --accent-soft: rgba(155, 183, 255, 0.18);
        --pink: #f3bdd8;
        --ok: #80d5b3;
        --warn: #ffd38a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(8, 12, 24, 0.72), rgba(8, 12, 24, 0.9)),
          url("/assets/generated/hero-archive-bg.png") center / cover fixed,
          radial-gradient(circle at top, rgba(243, 189, 216, 0.12), transparent 32%),
          var(--bg);
        color: var(--text);
        font: 14px/1.6 "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }

      .shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        backdrop-filter: blur(14px);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      }

      .hero-copy,
      .hero-side,
      .editor-panel,
      .article-list {
        padding: 20px;
      }

      .eyebrow {
        color: var(--pink);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
      }

      h1, h2, h3 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 28px;
        margin-top: 8px;
      }

      p {
        margin: 0;
      }

      .muted {
        color: var(--muted);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .chip {
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(12, 17, 30, 0.78);
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 20px;
      }

      .article-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .list-button,
      button,
      .link-button {
        appearance: none;
        border: 1px solid var(--line);
        background: rgba(14, 21, 36, 0.92);
        color: var(--text);
        border-radius: 12px;
        padding: 11px 14px;
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .list-button {
        text-align: left;
        width: 100%;
      }

      .list-button:hover,
      .list-button.is-active,
      button:hover,
      .link-button:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(23, 32, 54, 0.96);
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
      }

      .toolbar-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
      }

      input,
      textarea,
      select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(146, 171, 255, 0.18);
        background: rgba(7, 13, 25, 0.95);
        color: var(--text);
        padding: 12px 14px;
        font: inherit;
      }

      textarea {
        min-height: 460px;
        resize: vertical;
      }

      .json-area {
        min-height: 560px;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
      }

      .status.warn {
        color: var(--warn);
      }

      .hero-side {
        display: grid;
        gap: 16px;
      }

      .link-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .sticker {
        width: 84px;
        justify-self: end;
        filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.28));
      }

      @media (max-width: 960px) {
        .hero,
        .grid {
          grid-template-columns: 1fr;
        }

        .shell {
          padding-inline: 14px;
        }

        textarea,
        .json-area {
          min-height: 340px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="panel hero-copy">
          <div class="eyebrow">Local Archive Console</div>
          <h1>本地内容管理台</h1>
          <p class="muted" style="margin-top: 10px;">
            这是当前项目专用的本地编辑页，不需要登录。修改后会直接写入项目里的 JSON 和 Markdown 文件。
          </p>
          <div class="chips">
            <span class="chip">个人资料</span>
            <span class="chip">成长路线</span>
            <span class="chip">项目档案</span>
            <span class="chip">文章 Markdown</span>
          </div>
        </div>
        <div class="panel hero-side">
          <div>
            <div class="eyebrow">Status</div>
            <p id="server-status" class="status">正在连接本地管理服务...</p>
          </div>
          <div class="link-row">
            <a class="link-button" href="/" target="_blank" rel="noreferrer">打开前台首页</a>
            <button type="button" id="reload-all">重新载入</button>
          </div>
          <img class="sticker" src="/assets/generated/stickers/peace.png" alt="sticker" />
        </div>
      </section>

      <section class="grid">
        <aside class="panel article-list">
          <div class="eyebrow">Sections</div>
          <button class="list-button is-active" data-section="profile">个人资料 JSON</button>
          <button class="list-button" data-section="growth">成长路线 JSON</button>
          <button class="list-button" data-section="projects">项目档案 JSON</button>
          <button class="list-button" data-section="article-list">文章 Markdown</button>
          <div style="height: 1px; background: var(--line); margin: 8px 0;"></div>
          <div id="article-buttons" class="stack"></div>
        </aside>

        <main class="panel editor-panel">
          <div id="editor-root" class="stack"></div>
        </main>
      </section>
    </div>

    <script type="module" src="/admin/local-admin.js"></script>
  </body>
</html>
